# Template: copy to .github/workflows/claude.yml to enable @claude triggers.
# Requires repository secret ANTHROPIC_API_KEY (or OIDC via Claude GitHub App).
# Then any issue/PR comment containing "@claude" starts a Claude Code run,
# e.g. "@claude /sdlc CLY-1234". Jira Automation can post such comments to
# kick off the pipeline from a Jira transition or label.
#
# Docs: https://code.claude.com/docs/en/github-actions

name: Claude SDLC
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      contains(github.event.comment.body, '@claude') ||
      contains(github.event.issue.body, '@claude') ||
      contains(github.event.review.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # The repo's .claude/agents and .claude/commands are picked up
          # automatically, so "@claude /sdlc CLY-1234" runs the full pipeline.
          claude_args: "--max-turns 150"
